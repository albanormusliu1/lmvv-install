<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shto Punë</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Shto Punë të Re</h1>

<form onsubmit="ruajPune(); return false;">

<label>Emri i klientit</label><br>
<input id="klienti" type="text" placeholder="Shkruaj klientin"><br><br>

<label>Punëtori përgjegjës</label><br>
<input id="punetori" type="text" placeholder="Shkruaj punëtorin"><br><br>

<label>Lloji i punës</label><br>
<input id="lloji" type="text" placeholder="p.sh. Montim kaldaje"><br><br>

<label>Statusi</label><br>

<select id="statusi">
    <option>Në pritje</option>
    <option>Në proces</option>
    <option>Përfunduar</option>
</select>

<br><br>

<button type="submit">Ruaj Punën</button>

</form>

<br>

<a href="punet.html">
<button>Kthehu te Punët</button>
</a>


<script src="punet.js"></script>

</body>
</html>
