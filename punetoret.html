<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paneli - Firma Ngrohje</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Paneli i Firmës së Ngrohjes</h1>

<h3 id="pershendetje"></h3>

<div id="menu"></div>

<br>

<button onclick="dalja()">Dil</button>


<script>

let perdoruesi = JSON.parse(localStorage.getItem("perdoruesAktiv"));

if(!perdoruesi){
    window.location.href = "login.html";
}

document.getElementById("pershendetje").innerHTML =
"Mirë se erdhe: " + perdoruesi.username;


let menu = document.getElementById("menu");


if(perdoruesi.roli === "admin"){

menu.innerHTML = `

<a href="klientet.html">
<button>Klientët</button>
</a>

<a href="punetoret.html">
<button>Punëtorët</button>
</a>

<a href="punet.html">
<button>Punët</button>
</a>

<a href="materialet.html">
<button>Materialet</button>
</a>

<a href="faturat.html">
<button>Faturat</button>
</a>

`;

}


if(perdoruesi.roli === "punetor"){

menu.innerHTML = `

<a href="punet.html">
<button>Punët</button>
</a>

`;

}


function dalja(){

localStorage.removeItem("perdoruesAktiv");
window.location.href="login.html";

}

</script>

</body>
</html>
