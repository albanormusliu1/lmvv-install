<!DOCTYPE html>
<html lang="sq">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Firma e Ngrohjes</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<img src="logo.png" alt="Logo">

<h2>Firma e Ngrohjes</h2>

<button onclick="dalja()">Dil</button>

</div>


<h1>Paneli i Menaxhimit</h1>

<h3 id="pershendetje"></h3>


<div class="cards">

<a href="klientet.html" class="card">

<h2>👥</h2>

<p>Klientët</p>

</a>


<a href="punetoret.html" class="card">

<h2>👷</h2>

<p>Punëtorët</p>

</a>


<a href="punet.html" class="card">

<h2>🔧</h2>

<p>Punët</p>

</a>


<a href="materialet.html" class="card">

<h2>📦</h2>

<p>Materialet</p>

</a>


<a href="faturat.html" class="card">

<h2>💶</h2>

<p>Faturat</p>

</a>


<a href="raportet.html" class="card">

<h2>📈</h2>

<p>Raportet</p>

</a>

</div>


<br><br>


<div class="cards">

<div class="card">

<h2 id="nrKlienteve">0</h2>

<p>Klientë</p>

</div>


<div class="card">

<h2 id="nrPuntoreve">0</h2>

<p>Punëtorë</p>

</div>


<div class="card">

<h2 id="nrPuneve">0</h2>

<p>Punë</p>

</div>


<div class="card">

<h2 id="nrMaterialeve">0</h2>

<p>Materiale</p>

</div>


<div class="card">

<h2 id="nrFaturave">0</h2>

<p>Fatura</p>

</div>

</div>


<script>

let perdoruesi = JSON.parse(localStorage.getItem("perdoruesAktiv"));

if(!perdoruesi){

window.location.href="login.html";

}

document.getElementById("pershendetje").innerHTML =
"Mirë se erdhe, " + perdoruesi.username;


document.getElementById("nrKlienteve").innerHTML =
(JSON.parse(localStorage.getItem("klientet")) || []).length;

document.getElementById("nrPuntoreve").innerHTML =
(JSON.parse(localStorage.getItem("puntoret")) || []).length;

document.getElementById("nrPuneve").innerHTML =
(JSON.parse(localStorage.getItem("punet")) || []).length;

document.getElementById("nrMaterialeve").innerHTML =
(JSON.parse(localStorage.getItem("materialet")) || []).length;

document.getElementById("nrFaturave").innerHTML =
(JSON.parse(localStorage.getItem("faturat")) || []).length;


function dalja(){

localStorage.removeItem("perdoruesAktiv");

window.location.href="login.html";

}

</script>

</body>

</html>
