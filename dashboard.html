<!DOCTYPE html>
<html lang="sq">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Firma Ngrohje</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="header">

<img src="logo.png" alt="Logo">

<h2>Firma e Ngrohjes</h2>

<a href="dashboard.html">
<button>Dashboard</button>
</a>

</div>



<h1>Paneli i Menaxhimit</h1>


<h3 id="pershendetje"></h3>



<div id="menu" class="cards"></div>



<br>

<button onclick="dalja()">Dil</button>



<script>


let perdoruesi = JSON.parse(localStorage.getItem("perdoruesAktiv"));


if(!perdoruesi){

window.location.href="login.html";

}



document.getElementById("pershendetje").innerHTML =

"Mirë se erdhe: " + perdoruesi.username +
" (" + perdoruesi.roli + ")";



let menu = document.getElementById("menu");



if(perdoruesi.roli === "admin"){


menu.innerHTML = `


<a href="klientet.html" class="card">

<h2>👥</h2>

<p>Klientët</p>

</a>



<a href="punetoret.html" class="card">

<h2>👷</h2>

<p>Punëtorët</p>

</a>



<a href="punet.html" class="card">

<h2>🔧</h2>

<p>Punët</p>

</a>



<a href="materialet.html" class="card">

<h2>📦</h2>

<p>Materialet</p>

</a>



<a href="faturat.html" class="card">

<h2>💶</h2>

<p>Faturat</p>

</a>


`;

}



if(perdoruesi.roli === "punetor"){


menu.innerHTML = `


<a href="punet.html" class="card">

<h2>🔧</h2>

<p>Punët e mia</p>

</a>


`;

}



function dalja(){

localStorage.removeItem("perdoruesAktiv");

window.location.href="login.html";

}


</script>


</body>

</html>
