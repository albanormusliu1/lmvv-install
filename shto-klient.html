<!DOCTYPE html>

</head>

<body>

<h1>Shto Klient të Ri</h1>

<form onsubmit="ruajKlient(); return false;">

<label>Emri i klientit</label><br>
<input id="emri" type="text" placeholder="Shkruaj emrin"><br><br>

<label>Numri i telefonit</label><br>
<input id="telefoni" type="text" placeholder="Shkruaj telefonin"><br><br>

<label>Adresa</label><br>
<input id="adresa" type="text" placeholder="Shkruaj adresën"><br><br>

<label>Lloji i punës</label><br>
<input id="puna" type="text" placeholder="p.sh. Montim ngrohjeje"><br><br>

<button type="submit">Ruaj klientin</button>

</form>

<br>

<a href="klientet.html">
<button>Kthehu te klientët</button>
</a>
